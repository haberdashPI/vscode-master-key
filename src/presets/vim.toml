# author: David Little
# license: MIT https://github.com/haberdashPI/vscode-master-key/blob/main/LICENSE.md

## # Simple Vim Bindings

## This Vim binding set serves as a starting place to learn Master Key. Note that the goal of
## Master Key is to create modern modal keybinding configurations, rather than achieving
## perfect Vim parity (VSCodeVim and vscode-neovim already do this quite well). These
## bindings can be expanded on using `Master Key: New Keybinding Copy`.
##
## This binding set was generated from the MIT licensed bindings located at
## https://vim.rtorr.com/ using an LLM (Gemini CLI) and then cleaned and curated by hand.
##
## Contributions to improve the keybindings are welcome and can be submitted via a
## [PR](https://github.com/haberdashPI/vscode-master-key/pulls)

# NOTE: this file is used to generate both keybindings and to generate a markdown file that
# documents the bindings. When comments are prefixed `##` they are included in the final
# markdown output. All other comments will be ignored.

[header]
name = "Simple Vim"
version = "2.1.0"
requiredExtensions = [
    "haberdashPI.vscode-select-by-indent",
    "haberdashPI.selection-utilities",
    "pustelto.bracketeer",
    "wmaurer.change-case",
]

[[kind]]
name = "motion"
description = "These commands move the cursor and/or selections."

[[kind]]
name = "action"
description = "Actions do something with the selected text (e.g. delete it)."

[[kind]]
name = "util"
description = "Utility commands like help, mode switching, etc."

[[mode]]
name = "insert"
whenNoBinding = "insertCharacters"

[[mode]]
name = "normal"
default = true
cursorShape = "Block"

[[mode]]
name = "visual"
cursorShape = "Block"

## ## Normal Mode

## Normal mode is the default mode in VIM. In this mode each key issues a command,
## even when there is no modifier, like control. To insert text you issue
## an insert command (like `i`), see [Insert Mode](#insert-mode) for more ways
## to insert text.

[[bind]]
foreach.key = ["escape", "ctrl+["]
key = "{{key}}"
mode = '{{all_modes()}}'
command = "runCommands"
args.commands = [
    "cancelSelection",
    { command = "master-key.setMode", args = { value = "normal" } },
]
doc.kind = "util"
doc.name = "exit"
doc.description = "exit insert/visual mode"
doc.combined.name = "exit"
doc.combined.key = "Esc/Ctrl+["
doc.combined.description = "exit insert/visual mode"

## ## Getting Help

[[bind]]
key = "ctrl+;"
doc.kind = "util"
doc.name = "suggest"
finalKey = false
prefixes.any = true
mode = '{{all_modes()}}'
doc.description = """
show command suggestions within the context of the current mode and keybinding prefix
(if any). E.g. `g, ^;` in `normal` mode will show all `normal` command suggestions that
start with `g`.
"""
command = "master-key.toggleSuggestions"

[[bind]]
key = "ctrl+/"
doc.kind = "util"
doc.name = "text docs"
priority = -1
mode = "normal"
doc.description = "Show text documentation for keybindings"
command = "master-key.showTextDoc"

[[bind]]
key = "ctrl+shift+/"
doc.kind = "util"
doc.name = "visual doc"
priority = -1
mode = "normal"
doc.description = "Show visual documentation for keybindings"
command = "master-key.showVisualDoc"

# =============================================================================
## ## Cursor Movement (Normal, Visual, Operator)
# =============================================================================

# -- Templates for Motions --

[[define.val]]
operatorPending = false
operatorPrefixes = ["d", "y", "c"]

[[define.bind]]
id = "motion"
foreach.item = ['''{{[
    #{mode: "normal", operator: false},
    #{mode: "normal", operator: true},
    #{mode: "visual", operator: false},
]}}''']
mode = '{{item.mode}}'
prefixes.anyOf = '{{ if item.operator { val.operatorPrefixes } else { [""] } }}'
when = '{{ if item.operator { "master-key.val.operatorPending" } else { "true" } }}'

[[define.bind.after]]
skipWhen = '{{!item.operator}}'
command = "master-key.executeStoredCommand"
args.register = "op"

[[define.bind.after]]
skipWhen = '{{!item.operator}}'
command = "master-key.setValue"
args.name = "operatorPending"
args.value = false

[[define.bind]]
id = "cursor_motion"
default = "{{bind.motion}}"
command = "cursorMove"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'

# -- h, j, k, l --

# h
[[bind]]
default = "{{bind.cursor_motion}}"
key = "h"
tags = ["motion"]
doc.kind = "motion"
args.to = "left"
doc.name = "←"
doc.description = "move cursor left"
doc.combined.name = "←/→"
doc.combined.key = "h/l"
doc.combined.description = "move cursor left/right"

# l
[[bind]]
default = "{{bind.cursor_motion}}"
key = "l"
tags = ["motion"]
doc.kind = "motion"
args.to = "right"
doc.name = "→"
doc.description = "move cursor right"
doc.combined.name = "←/→"

[[bind.args.commands]]
args.to = "right"

# j
[[bind]]
default = "{{bind.motion}}"
key = "j"
tags = ["motion"]
doc.kind = "motion"
command = "runCommands"
doc.name = "↓"
doc.description = "move cursor down"
doc.combined.name = "↓/↑"
doc.combined.key = "j/k"
doc.combined.description = "move cursor down/up"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.shrinkToActive"

[[bind.args.commands]]
command = "cursorMove"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'
args.to = "down"
args.by = "wrappedLine"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "expandLineSelection"

# k
[[bind]]
default = "{{bind.motion}}"
key = "k"
tags = ["motion"]
doc.kind = "motion"
command = "runCommands"
doc.name = "↑"
doc.description = "move cursor up"
doc.combined.name = "↓/↑"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.shrinkToActive"

[[bind.args.commands]]
command = "cursorMove"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'
args.to = "up"
args.by = "wrappedLine"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "expandLineSelection"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.exchangeAnchorActive"

# g j
[[bind]]
default = "{{bind.motion}}"
key = "g j"
doc.kind = "motion"
command = "runCommands"
doc.name = "↓ wrap"
doc.description = "move cursor down (multi-line text)"
doc.combined.name = "↓/↑ wrap"
doc.combined.key = "gj/gk"
doc.combined.description = "move cursor down/up (multi-line text)"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.shrinkToActive"

[[bind.args.commands]]
command = "cursorMove"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'
args.to = "down"
args.by = "wrappedLine"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "expandLineSelection"

[[bind]]
default = "{{bind.motion}}"
key = "g k"
doc.kind = "motion"
command = "runCommands"
doc.name = "↑ wrap"
doc.description = "move cursor up (multi-line text)"
doc.combined.name = "↓/↑ wrap"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.shrinkToActive"

[[bind.args.commands]]
command = "cursorMove"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'
args.to = "up"
args.by = "wrappedLine"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "expandLineSelection"

[[bind.args.commands]]
skipWhen = '{{!item.operator}}'
command = "selection-utilities.exchangeAnchorActive"

# -- page up/down

[[bind]]
key = "ctrl+d"
doc.kind = "motion"
doc.name = "pg ↓"
doc.combined.name = "pg ↓/↑"
doc.combined.key = "ctrl+d/ctrl+u"
doc.combined.description = "move down/up, relative to page size"
doc.description = "move down, relative to page size"
mode = ["normal", "visual", "insert"]
command = "selection-utilities.activePageMove"
args.dir = "down"
args.value = "{{max(key.count, 1)/2}}"
args.select = '{{key.mode == "visual"}}'

[[bind]]
key = "ctrl+u"
doc.kind = "motion"
doc.name = "pg ↑"
doc.combined.name = "pg ↓/↑"
doc.description = "select up, relative to page size"
mode = ["normal", "visual", "insert"]
command = "selection-utilities.activePageMove"
args.dir = "up"
args.count = "{{(max(key.count, 1))/2}}"
args.select = '{{key.mode == "visual"}}'

# -- Word Motions (w, W, e, E, b, B) --

[[define.bind]]
id = "object_motion"
default = '{{bind.motion}}'
command = "selection-utilities.moveBy"
args.value = '{{max(key.count, 1)}}'
args.select = '{{item.mode == "visual" || item.operator}}'

# w (start of word)
[[bind]]
default = "{{bind.object_motion}}"
key = "w"
tags = ["motion"]
doc.kind = "motion"
args.unit = "subword"
args.boundary = "start"
doc.name = "word →"
doc.description = "jump forwards to the start of a word"
doc.combined.name = "word →/←"
doc.combined.key = "w/b"
doc.combined.description = "jump forwards/backwards to the start of a word"

# b (back start of word)
[[bind]]
default = '{{bind.object_motion}}'
key = "b"
tags = ["motion"]
doc.kind = "motion"
args.unit = "subword"
args.boundary = "start"
args.value = '{{-max(key.count, 1)}}'
doc.name = "word ←"
doc.description = "jump backwards to the start of a word"
doc.combined.name = "word →/←"

# W (start of WORD)
[[bind]]
default = "{{bind.object_motion}}"
key = "shift+w"
tags = ["motion"]
doc.kind = "motion"
args.unit = "BigWord"
args.boundary = "start"
doc.name = "WORD →"
doc.description = "jump forwards to the start of a word (words can contain punctuation)"
doc.combined.name = "WORD →/←"
doc.combined.key = "shift+w/shift+b"
doc.combined.description = "jump forwards/backwards to the start of a word (words can contain punctuation)"

# B (back start of WORD)
[[bind]]
default = '{{bind.object_motion}}'
key = "shift+b"
tags = ["motion"]
doc.kind = "motion"
args.unit = "BigWord"
args.boundary = "start"
args.value = '{{-max(key.count, 1)}}'
doc.name = "WORD ←"
doc.description = "jump backwards to the start of a word (including punctuation)"
doc.combined.name = "WORD →/←"
doc.combined.key = "shift+w/shift+b"

# e (end of word)
[[bind]]
default = '{{bind.object_motion}}'
key = "e"
tags = ["motion"]
doc.kind = "motion"
args.unit = "subword"
args.boundary = "end"
doc.name = "word end"
doc.description = "jump forwards to the end of a word"
doc.combined.name = "word/WORD end"
doc.combined.key = "e/shift+e"
doc.combined.description = "jump forwards to the end of a word"

# E (end of WORD)
[[bind]]
default = '{{bind.object_motion}}'
key = "shift+e"
tags = ["motion"]
doc.kind = "motion"
args.unit = "BigWord"
args.boundary = "end"
doc.name = "WORD end"
doc.description = "jump forwards to the end of a word (including punctuation)"
doc.combined.name = "word/WORD end"

# shift+]/shift+[ paragraph
[[bind]]
default = "{{bind.object_motion}}"
key = "shift+]"
tags = ["motion"]
doc.kind = "motion"
args.unit = "paragraph"
args.boundary = "start"
doc.name = "par. →"
doc.description = "jump forwards to the start of a paragraph (contiguous lines)"
doc.combined.name = "paragraph →/←"
doc.combined.key = "shift+]/shift+["
doc.combined.description = "jump forwards/backwards to the start of a paragraph (contiguous lines)"

[[bind]]
default = "{{bind.object_motion}}"
key = "shift+["
tags = ["motion"]
doc.kind = "motion"
args.unit = "paragraph"
args.boundary = "start"
doc.name = "par. ←"
args.value = '{{-max(key.count, 1)}}'
doc.description = "jump backwards to the start of a paragraph (contiguous lines)"
doc.combined.name = "paragraph →/←"
doc.combined.key = "shift+]/shift+["
doc.combined.description = "jump forwards/backwards to the start of a paragraph (contiguous lines)"

# -- Line Motions (0, ^, $, g_, gg, G) --

# 0 (start of line)
[[bind]]
default = '{{bind.motion}}'
key = "0"
tags = ["motion"]
doc.kind = "motion"
command = '{{if item.mode == "normal" { "cursorLineStart" } else { "cursorLineStartSelect" } }}'
doc.name = "line start"
doc.description = "jump to the start of the line"
doc.combined.name = "line start/end"
doc.combined.key = "0/$"
doc.combined.description = "jump to the start/end of the line"

# ^ (first non-blank)
[[bind]]
default = '{{bind.motion}}'
key = "shift+6"
tags = ["motion"]
doc.kind = "motion"
command = '{{if item.mode == "normal" { "cursorHome" } else { "cursorHomeSelect" } }}'
doc.name = "first non-blank"
doc.description = "jump to the first non-blank character of the line"

# $ (end of line)
[[bind]]
default = '{{bind.motion}}'
key = "shift+4"
tags = ["motion"]
doc.kind = "motion"
command = '{{if item.mode == "normal" { "cursorLineEnd" } else { "cursorLineEndSelect" } }}'
doc.name = "line end"
doc.description = "jump to the end of the line"

# gg (start of doc)
[[bind]]
default = '{{bind.motion}}'
key = "g g"
tags = ["motion"]
doc.kind = "motion"
command = '{{if item.mode == "normal" { "cursorTop" } else { "cursorTopSelect" } }}'
doc.name = "doc start"
doc.description = "go to the first line of the document"
doc.combined.name = "doc start/end"
doc.combined.key = "gg/G"
doc.combined.description = "go to the first/last line of the document"

# G (end of doc)
[[bind]]
default = '{{bind.motion}}'
key = "shift+g"
tags = ["motion"]
doc.kind = "motion"
command = '{{if item.mode == "normal" { "cursorBottom" } else { "cursorBottomSelect" } }}'
doc.name = "doc end"
doc.description = "go to the last line of the document"

# -- Find Characters (f, t) --

[[bind]]
key = "f"
tags = ["motion"]
doc.kind = "motion"
default = '{{bind.motion}}'
command = "master-key.search"
args.offset = "fartherBoundary"
args.skip = "{{(max(key.count,1))-1}}"
args.selectTillMatch = '{{item.mode == "visual" || item.operator}}'
args.acceptAfter = 1
doc.name = "find →"
doc.description = "jump to next occurrence of character x"
doc.combined.name = "find →/←"
doc.combined.description = "jump to next/previous occurrence of character x"
doc.combined.key = "f/shift+f"

[[bind]]
key = "shift+f"
tags = ["motion"]
doc.kind = "motion"
default = '{{bind.motion}}'
command = "master-key.search"
args.offset = "fartherBoundary"
args.skip = "{{(max(key.count,1))-1}}"
args.reverse = true
args.selectTillMatch = '{{item.mode != "normal"}}'
args.acceptAfter = 1
doc.name = "find ←"
doc.description = "jump to previous occurrence of character x"
doc.combined.name = "find →/←"

[[bind]]
key = "t"
tags = ["motion"]
doc.kind = "motion"
default = '{{bind.motion}}'
command = "master-key.search"
args.offset = "closerBoundary"
args.skip = "{{(max(key.count,1))-1}}"
args.selectTillMatch = '{{item.mode == "visual" || item.operator}}'
args.acceptAfter = 1
doc.name = "to →"
doc.description = "jump to just before the next occurrence of character x"
doc.combined.name = "to →/←"
doc.combined.description = "jump to just before the next/previous occurrence of character x"
doc.combined.key = "t/shift+t"

[[bind]]
key = "shift+t"
tags = ["motion"]
doc.kind = "motion"
default = '{{bind.motion}}'
command = "master-key.search"
args.offset = "closerBoundary"
args.skip = "{{(max(key.count,1))-1}}"
args.selectTillMatch = '{{item.mode == "visual" || item.operator}}'
args.acceptAfter = 1
doc.name = "to ←"
doc.description = "jump to just before the previous occurrence of character x"
doc.combined.name = "to →/←"
doc.combined.description = "jump to just before the next/previous occurrence of character x"
doc.combined.key = "t/shift+t"

# =============================================================================
## ## Text Objects (aw, iw, etc.)
# =============================================================================

[[define.bind]]
id = "object"
mode = 'normal'
prefixes.anyOf = '{{val.operatorPrefixes}}'
when = "master-key.val.operatorPending"

[[define.bind.after]]
command = "master-key.executeStoredCommand"
args.register = "op"

[[define.bind.after]]
command = "master-key.setValue"
args.name = "operatorPending"
args.value = false

# iw (inner word)
[[bind]]
default = '{{bind.object}}'
key = "i w"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "subword", boundary = "both", selectWhole = true }
doc.name = "in word"
doc.description = "operate on entire word"

# aw (around word)
[[bind]]
default = '{{bind.object}}'
key = "a w"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "subword", boundary = "start", selectWhole = true }
doc.name = "around word"
doc.description = "operate on entire word and space"

# iW (inner WORD)
[[bind]]
default = '{{bind.object}}'
key = "i shift+w"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "BigWord", boundary = "both", selectWhole = true }
doc.name = "in WORD"
doc.description = "operate on entire word (including punctuation)"

# aW (around WORD)
[[bind]]
default = '{{bind.object}}'
key = "a shift+w"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "BigWord", boundary = "start", selectWhole = true }
doc.name = "ard WORD"
doc.description = "operate around entire word (including punctuation)"

# ip (inner paragraph)
[[bind]]
default = '{{bind.object}}'
key = "i p"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "paragraph", boundary = "both", selectWhole = true }
doc.name = "in paragraph"
doc.description = "operate on entire paragraph"

# ap (around paragraph)
[[bind]]
default = '{{bind.object}}'
key = "a p"
doc.kind = "motion"
command = "selection-utilities.moveBy"
args = { unit = "paragraph", boundary = "start", selectWhole = true }
doc.name = "around paragraph"
doc.description = "operate on entire paragraph and spacing"

# =============================================================================
## ## Counts (0-9)
# =============================================================================

## Counts can be prefixed to commands to repeat them the given number of times.
## e.g. `9dj` deletes 9 lines

[[bind]]
foreach.num = ['{{keys(`[1-9]`)}}']
key = "{{num}}"
mode = '{{not_modes(["insert"])}}'
command = "master-key.updateCount"
finalKey = false
args.value = "{{num}}"
doc.kind = "util"
doc.name = "count {{num}}"
doc.description = "Add digit {{num}} to the count argument of a command."
doc.combined.key = "0-9"
doc.combined.name = "count 0-9"
doc.combined.description = "Add digit 0-9 to count argument of a command"

[[bind]]
foreach.num = ['{{keys(`[1-9]`)}}']
key = "numpad{{num}}"
mode = '{{not_modes(["insert"])}}'
command = "master-key.updateCount"
finalKey = false
args.value = "{{num}}"
doc.kind = "util"
doc.name = "count {{num}}"
doc.description = "Add digit {{num}} to the count argument of a command."
doc.combined.key = "0-9"
doc.combined.name = "count 0-9"
doc.combined.description = "Add digit 0-9 to count argument of a command"

# 0 means go to the start of the line *unless* we have already entered a count and then its
# used to update the count
[[bind]]
key = "0"
mode = '{{all_modes()}}'
command = "master-key.updateCount"
when = "master-key.count > 0"
finalKey = false
args.value = "0"
doc.kind = "util"
doc.name = "count 0"
doc.description = "Add digit 0 to the count argument of a command"
doc.combined.key = "0-9"
doc.combined.name = "count 0-9"
doc.combined.description = "Add digit 0-9 to count argument of a command"

# =============================================================================
## ## Insert Mode
# =============================================================================

[[bind]]
key = "i"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "master-key.enterInsert"
doc.name = "insert"
doc.description = "insert before the cursor"
doc.combined.name = "insert start/line"
doc.combined.key = "i/I"
doc.combined.description = "insert before the cursor / at the beginning of the line"


[[bind]]
key = "shift+i"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["cursorLineStart", "master-key.enterInsert"]
doc.name = "insert start"
doc.description = "insert at the beginning of the line"

[[bind]]
key = "a"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["cursorRight", "master-key.enterInsert"]
doc.name = "append"
doc.description = "insert (append) after the cursor"
doc.combined.name = "append end/line"
doc.combined.key = "a/A"
doc.combined.description = "insert (append) after the cursor / at the end of the line"


[[bind]]
key = "shift+a"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["cursorLineEnd", "master-key.enterInsert"]
doc.name = "append end"
doc.description = "insert (append) at the end of the line"

[[bind]]
key = "o"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["editor.action.insertLineAfter", "master-key.enterInsert"]
doc.name = "open below"
doc.description = "append (open) a new line below the current line"
doc.combined.name = "open below/above"
doc.combined.key = "o/O"
doc.combined.description = "append (open) a new line below/above the current line"

[[bind]]
key = "shift+o"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["editor.action.insertLineBefore", "master-key.enterInsert"]
doc.name = "open above"
doc.description = "append (open) a new line above the current line"

# =============================================================================
## ## Editing / Operators
# =============================================================================

# d (Delete / Cut)
[[bind]]
key = "d"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    { command = "master-key.setValue", args = { name = "operatorPending", value = true } },
    { command = "master-key.storeCommand", args = { register = "op", command = "editor.action.clipboardCutAction" } },
    { command = "master-key.prefix", args = { cursor = "Underline" } },
]
doc.name = "delete"
doc.description = "delete marked text"

[[bind]]
key = "d"
mode = "visual"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    "editor.action.clipboardCutAction",
    { command = "master-key.setMode", args = { value = "normal" } },
]
doc.name = "delete"
doc.description = "delete marked text"

# dd (Delete line)
[[bind]]
key = "d"
prefixes.anyOf = "d"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    "selection-utilities.shrinkToActive",
    "expandLineSelection",
    # Execute op (cut)
    { command = "master-key.executeStoredCommand", args.register = "op" },
]
doc.name = "delete line"
doc.description = "delete (cut) a line"

# y (Yank / Copy)
[[bind]]
key = "y"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
doc.name = "yank"
doc.description = "yank (copy) marked text"

[[bind.args.commands]]
command = "master-key.setValue"
args = { name = "operatorPending", value = true }

[[bind.args.commands]]
command = "master-key.storeCommand"
args.register = "op"
args.command = "runCommands"
args.args.commands = [
    "editor.action.clipboardCopyAction",
    "selection-utilities.shrinkToActive",
]

[[bind.args.commands]]
command = "master-key.prefix"
args = { cursor = "Underline" }

[[bind]]
key = "y"
mode = "visual"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    "editor.action.clipboardCopyAction",
    { command = "master-key.setMode", args = { value = "normal" } },
]
doc.name = "yank"
doc.description = "yank (copy) marked text"

# yy (Yank line)
[[bind]]
key = "y"
prefixes.anyOf = "y"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    "selection-utilities.shrinkToActive",
    "expandLineSelection",
    { command = "master-key.executeStoredCommand", args.register = "op" },
]
doc.name = "yank line"
doc.description = "yank (copy) a line"

# c (Change)
[[bind]]
key = "c"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    { command = "master-key.setValue", args = { name = "operatorPending", value = true } },
    { command = "master-key.storeCommand", args = { register = "op", command = "runCommands", args = { commands = [
        "editor.action.clipboardCutAction",
        "master-key.enterInsert",
    ] } } },
    { command = "master-key.prefix", args = { cursor = "Underline" } },
]
doc.name = "change"
doc.description = "change"

# cc (Change line)
[[bind]]
key = "c"
prefixes.anyOf = "c"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    "selection-utilities.shrinkToActive",
    "expandLineSelection",
    "editor.action.clipboardCutAction",
    "master-key.enterInsert",
]
doc.name = "change line"
doc.description = "change (replace) entire line"

# x (delete char)
[[bind]]
key = "x"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = [
    { command = "cursorMove", args = { to = "right", select = true, value = "{{max(key.count, 1)}}" } },
    "editor.action.clipboardCutAction",
]
doc.name = "del char"
doc.description = "delete (cut) character"

# p (paste)
[[bind]]
key = "p"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "editor.action.clipboardPasteAction"
doc.name = "paste"
doc.description = "put (paste) the clipboard after cursor"

# u (undo)
[[bind]]
key = "u"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["undo", "selection-utilities.shrinkToActive"]
doc.name = "undo"
doc.description = "undo"

# Ctrl+r (redo)
[[bind]]
key = "ctrl+r"
mode = "normal"
tags = ["action"]
doc.kind = "action"
command = "runCommands"
args.commands = ["redo", "selection-utilities.shrinkToActive"]
doc.name = "redo"
doc.description = "redo"

# =============================================================================
## ## Visual Mode
# =============================================================================

## In visual mode there is an ongoing selection that is modified by motions.
## Commands (like `d`) operate on the selected text.

[[bind]]
key = "v"
mode = "normal"
doc.kind = "util"
command = "master-key.setMode"
args.value = "visual"
doc.name = "visual"
doc.description = "start visual mode"

# =============================================================================
## ## Search
# =============================================================================

[[bind]]
key = "/"
mode = ["normal", "visual"]
doc.kind = "motion"
command = "master-key.search"
args = { offset = "start", selectTillMatch = '{{key.mode == "visual"}}' }
doc.name = "search"
doc.description = "search for pattern"

[[bind]]
key = "shift+/"
mode = ["normal", "visual"]
doc.kind = "motion"
command = "master-key.search"
args = { offset = "start", backwards = true, selectTillMatch = '{{key.mode == "visual"}}' }
doc.name = "search"
doc.description = "search for pattern"

[[bind]]
key = "n"
mode = ["normal", "visual"]
doc.kind = "motion"
command = "master-key.nextMatch"
args.selectTillMatch = '{{key.mode == "visual"}}'
doc.name = "next"
doc.description = "repeat search in same direction"
doc.combined.name = "next/prev match"
doc.combined.key = "n/N"
doc.combined.description = "repeat search in same/opposite direction"

[[bind]]
key = "shift+n"
mode = ["normal", "visual"]
doc.kind = "motion"
command = "master-key.previousMatch"
args.selectTillMatch = '{{key.mode == "visual"}}'
doc.name = "previous"
doc.description = "repeat search in opposite direction"

